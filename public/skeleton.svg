<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Container Group that animates from left to right -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="-50,0; 250,0; -50,0" 
      dur="6s" 
      repeatCount="indefinite"
    />

    <g stroke="#00f3ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <!-- Head -->
      <circle cx="50" cy="30" r="12" fill="none">
        <animate attributeName="cy" values="30;28;30" dur="1s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Spine -->
      <line x1="50" y1="42" x2="50" y2="100">
        <animate attributeName="y1" values="42;40;42" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="100;98;100" dur="1s" repeatCount="indefinite"/>
      </line>

      <!-- Left Arm -->
      <polyline points="50,55 30,80 20,110">
        <animate attributeName="points" values="50,55 30,80 20,110; 50,53 25,75 15,100; 50,55 30,80 20,110" dur="1s" repeatCount="indefinite"/>
      </polyline>

      <!-- Right Arm -->
      <polyline points="50,55 70,80 80,110">
        <animate attributeName="points" values="50,55 70,80 80,110; 50,53 75,75 85,100; 50,55 70,80 80,110" dur="1s" repeatCount="indefinite"/>
      </polyline>

      <!-- Left Leg -->
      <polyline points="50,100 35,140 30,180">
        <animate attributeName="points" values="50,100 35,140 30,180; 50,98 40,130 35,170; 50,100 35,140 30,180" dur="1s" repeatCount="indefinite"/>
      </polyline>

      <!-- Right Leg -->
      <polyline points="50,100 65,140 70,180">
        <animate attributeName="points" values="50,100 65,140 70,180; 50,98 60,150 65,190; 50,100 65,140 70,180" dur="1s" repeatCount="indefinite"/>
      </polyline>
    </g>

    <!-- Joints (Dots) -->
    <g fill="#b73bfe">
      <circle cx="50" cy="55" r="3"><animate attributeName="cy" values="55;53;55" dur="1s" repeatCount="indefinite"/></circle>
      <circle cx="30" cy="80" r="3"><animate attributeName="cy" values="80;75;80" dur="1s" repeatCount="indefinite"/><animate attributeName="cx" values="30;25;30" dur="1s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="80" r="3"><animate attributeName="cy" values="80;75;80" dur="1s" repeatCount="indefinite"/><animate attributeName="cx" values="70;75;70" dur="1s" repeatCount="indefinite"/></circle>
      <circle cx="50" cy="100" r="3"><animate attributeName="cy" values="100;98;100" dur="1s" repeatCount="indefinite"/></circle>
      <circle cx="35" cy="140" r="3"><animate attributeName="cy" values="140;130;140" dur="1s" repeatCount="indefinite"/><animate attributeName="cx" values="35;40;35" dur="1s" repeatCount="indefinite"/></circle>
      <circle cx="65" cy="140" r="3"><animate attributeName="cy" values="140;150;140" dur="1s" repeatCount="indefinite"/><animate attributeName="cx" values="65;60;65" dur="1s" repeatCount="indefinite"/></circle>
    </g>
  </g>
</svg>
