<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100">
  <defs>
    <linearGradient id="waveGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b73bfe" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00f3ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b73bfe" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Grid -->
  <path d="M 0 25 L 300 25 M 0 50 L 300 50 M 0 75 L 300 75" stroke="#00f3ff" stroke-opacity="0.1" stroke-width="1" />
  <path d="M 75 0 L 75 100 M 150 0 L 150 100 M 225 0 L 225 100" stroke="#00f3ff" stroke-opacity="0.1" stroke-width="1" />

  <!-- Animated Data Wave 1 -->
  <polyline fill="none" stroke="url(#waveGlow)" stroke-width="2">
    <animate attributeName="points" 
             values="0,50 50,20 100,80 150,40 200,60 250,30 300,50;
                     0,50 50,60 100,30 150,70 200,20 250,80 300,50;
                     0,50 50,20 100,80 150,40 200,60 250,30 300,50" 
             dur="1.5s" repeatCount="indefinite" />
  </polyline>

  <!-- Animated Data Wave 2 (Faster, Jittery) -->
  <polyline fill="none" stroke="#b73bfe" stroke-width="1" stroke-opacity="0.8">
    <animate attributeName="points" 
             values="0,70 30,50 70,90 120,40 180,80 230,30 300,60;
                     0,60 30,80 70,40 120,90 180,30 230,70 300,60;
                     0,70 30,50 70,90 120,40 180,80 230,30 300,60" 
             dur="0.8s" repeatCount="indefinite" />
  </polyline>

  <!-- Simulating Node Data Injection Points -->
  <g fill="#fff">
    <circle cx="50" cy="20" r="3"><animate attributeName="cy" values="20;60;20" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="40" r="3"><animate attributeName="cy" values="40;70;40" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="30" r="3"><animate attributeName="cy" values="30;80;30" dur="1.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
