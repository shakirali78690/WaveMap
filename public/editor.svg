<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="150">
  <defs>
    <linearGradient id="wallGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Isometric Grid -->
  <g stroke="#00f3ff" stroke-width="0.5" stroke-opacity="0.2">
    <line x1="100" y1="130" x2="190" y2="85" />
    <line x1="100" y1="130" x2="10" y2="85" />
    <line x1="10" y1="85" x2="100" y2="40" />
    <line x1="190" y1="85" x2="100" y2="40" />
  </g>

  <g transform="translate(0, 10)">
    <!-- Base 2D Path Drawing -->
    <path d="M 100 120 L 150 95 L 100 70 L 50 95 Z" fill="none" stroke="#b73bfe" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,300; 300,0; 300,0" dur="4s" repeatCount="indefinite" />
    </path>

    <!-- Extruded Walls appearing -->
    <g fill="url(#wallGlow)" stroke="#00f3ff" stroke-width="1">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.4; 0.6; 0.9; 1" dur="4s" repeatCount="indefinite" />
      
      <!-- Left Wall -->
      <path d="M 50 95 L 100 120 L 100 80 L 50 55 Z" />
      <!-- Right Wall -->
      <path d="M 100 120 L 150 95 L 150 55 L 100 80 Z" />
    </g>

    <!-- Top Face / Roof appearing later -->
    <path d="M 100 80 L 150 55 L 100 30 L 50 55 Z" fill="#00f3ff" fill-opacity="0.4" stroke="#00f3ff" stroke-width="2">
      <animate attributeName="opacity" values="0; 0; 0; 1; 0" keyTimes="0; 0.4; 0.6; 0.9; 1" dur="4s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
