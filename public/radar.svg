<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Crosshairs -->
  <line x1="100" y1="10" x2="100" y2="190" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="10" y1="100" x2="190" y2="100" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Scanning wedge -->
  <g>
    <path d="M 100 100 L 100 10 A 90 90 0 0 1 190 100 Z" fill="url(#glow)"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Blips -->
  <circle cx="140" cy="60" r="3" fill="#fff">
    <animate attributeName="opacity" values="1;0;0" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="130" r="4" fill="#fff">
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.4;0.9;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
